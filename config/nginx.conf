worker_processes 1;

daemon off;
error_log logs/error.log info;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {

    resolver 8.8.8.8 8.8.4.4 ipv6=off; # 구글 DNS

    include       mime.types;
    default_type  application/octet-stream;

    lua_code_cache off;
    lua_package_path "/usr/local/openresty/luajit-rocks/share/lua/5.1/?.lua;$prefix/src/?.lua;;";

    lua_shared_dict health_check 1m;

    client_body_timeout 5s; # 요청 바디 수신 타임아웃
    client_header_timeout 5s; # 요청 헤더 수신 타임아웃

    upstream backend {
        server 127.0.0.1:8080;
        keepalive 64;
    }

    init_by_lua_file src/init.lua;
    init_worker_by_lua_block {
        local ok, init_worker = pcall(require, "init_worker")
        if not ok then
            ngx.log(ngx.ERR, "init_worker 모듈 로드 실패: ", init_worker)
            ngx.exit(500)
            return
        end
        init_worker.check()
    }


    server {
        listen 80;

        header_filter_by_lua_block {
            -- 기존 Server 헤더(nginx/1.x.x)를 아예 삭제
            ngx.header.server = "clash.kr"
    
            -- 혹시 백엔드에서 보낸 다른 정체성 정보들도 삭제
            ngx.header["X-Powered-By"] = nil
            ngx.header["X-AspNet-Version"] = nil
        }

        include conf.d/*.conf;


        location /api/auth {
            access_by_lua_block {
                -- local auth = require("auth.auth")
                -- pcall로 감싸서 진짜 에러가 뭔지 출력
                local ok, auth = pcall(require, "auth.auth")
                if not ok then
                    ngx.log(ngx.ERR, "실제 에러 원인: ", auth) 
                    ngx.exit(500)
                end
                auth.authenticate()
            }
        }

        location / {
            # proxy_redirect  default;
            # proxy_pass http://backend;

            

            # include  config/conf.d/proxy.conf;
        }

    }
}